stages:
  - build
  - deploy

# 빌드 단계
build:
  stage: build
  script:
    - echo "Building the project"
    - echo "Installing dependencies"
    - sudo apt-get update && apt-get install -y nodejs npm
    - bash -l -c 'npm install' 
    - echo "Building the project"
    - bash -l -c 'npm run build'
  only:
    - dev
  tags:
    - frontend

# 배포 단계
deploy:
  stage: deploy
  script:
    - echo "Starting deployment"
    - ssh kdt@34.64.75.50 "~/frontend/auraSphere && git pull origin dev && npm install && npm run build" 
  only:
    - dev 
    - main
  environment:
    name: production
    url: http://34.64.75.50
